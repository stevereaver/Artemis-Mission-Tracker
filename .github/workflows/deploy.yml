name: Deploy to Cloud Run

on:
  push:
    branches: [ "main" ]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}
  SERVICE: ${{ secrets.GCP_SERVICE_NAME }}
  REPOSITORY: ${{ secrets.GCP_REPOSITORY }}
  # Terraform variables
  TF_VAR_GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  TF_VAR_GCP_REGION: ${{ secrets.GCP_REGION }}
  TF_VAR_GCP_SERVICE_NAME: ${{ secrets.GCP_SERVICE_NAME }}
  TF_VAR_GCP_REPOSITORY: ${{ secrets.GCP_REPOSITORY }}
  TF_VAR_GCP_STATE_BUCKET: ${{ secrets.GCP_STATE_BUCKET }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init -backend-config="bucket=${{ secrets.GCP_STATE_BUCKET }}"

      - name: Create Artifact Registry
        working-directory: ./terraform
        run: terraform apply -target=google_artifact_registry_repository.artemis_images -auto-approve

      - name: 'Docker Auth'
        run: |-
          gcloud auth configure-docker "${{ env.REGION }}-docker.pkg.dev"

      - name: Build and Push Container
        id: build
        run: |-
          DOCKER_TAG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE }}:${{ github.sha }}"
          docker build -t "${DOCKER_TAG}" .
          docker push "${DOCKER_TAG}"
          echo "image=${DOCKER_TAG}" >> $GITHUB_OUTPUT

      - name: Terraform Deploy (Full)
        working-directory: ./terraform
        run: terraform apply -auto-approve -var="GCP_IMAGE=${{ steps.build.outputs.image }}"

      - name: Show Output
        run: echo "Deployment complete."
